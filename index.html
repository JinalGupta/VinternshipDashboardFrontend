<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vinternship · Live Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050508;--s1:#0c0c12;--s2:#12121a;--s3:#1a1a24;--s4:#22222e;
  --rim:rgba(255,255,255,0.055);--rim2:rgba(255,255,255,0.10);
  --text:#ededf8;--sub:#6868a0;--dim:#30304a;
  --font:'Sora',sans-serif;--mono:'JetBrains Mono',monospace;--r:12px;
  --c0:#7c6af7;--c1:#00d4ff;--c2:#00e58a;--c3:#ff5c7a;--c4:#ffb940;--c5:#c77dff;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 65% 40% at 0% 0%,rgba(124,106,247,.10) 0%,transparent 60%),
    radial-gradient(ellipse 50% 35% at 100% 5%,rgba(0,212,255,.07) 0%,transparent 55%),
    radial-gradient(ellipse 55% 45% at 50% 105%,rgba(0,229,138,.06) 0%,transparent 55%);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:99px;}
header{position:sticky;top:0;z-index:200;height:60px;padding:0 44px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  background:rgba(5,5,8,.88);backdrop-filter:blur(24px);border-bottom:1px solid var(--rim);}
.hd-logo{display:flex;align-items:center;gap:12px;}
.hd-mark{width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--c0),var(--c3));
  display:flex;align-items:center;justify-content:center;font-size:17px;
  box-shadow:0 4px 14px rgba(124,106,247,.35);}
.hd-title{font-size:16px;font-weight:700;letter-spacing:-.2px;}
.hd-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.pill{padding:4px 12px;border-radius:99px;font-family:var(--mono);font-size:11px;font-weight:500;
  background:var(--s2);border:1px solid var(--rim);color:var(--sub);}
.pill.on{background:rgba(0,229,138,.08);border-color:rgba(0,229,138,.2);color:var(--c2);}
.pill.err{background:rgba(255,92,122,.08);border-color:rgba(255,92,122,.2);color:var(--c3);}
#refreshBtn{padding:5px 14px;border-radius:8px;border:1px solid var(--rim);
  background:var(--s2);color:var(--sub);font-family:var(--font);font-size:12px;
  font-weight:600;cursor:pointer;transition:all .2s;}
#refreshBtn:hover{color:var(--text);border-color:var(--rim2);}
.tab-bar{position:sticky;top:60px;z-index:190;padding:0 44px;display:flex;gap:2px;
  background:rgba(5,5,8,.82);backdrop-filter:blur(20px);border-bottom:1px solid var(--rim);
  overflow-x:auto;scrollbar-width:none;}
.tab-bar::-webkit-scrollbar{display:none;}
.tab{padding:12px 18px;border:none;background:transparent;color:var(--sub);
  font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .18s;
  white-space:nowrap;display:flex;align-items:center;gap:7px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--text);font-weight:700;border-bottom-color:var(--tc,var(--c0));}
.tdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.main{padding:36px 44px 100px;position:relative;z-index:1;}
.slabel{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;
  color:var(--sub);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.slabel::after{content:'';flex:1;height:1px;background:var(--rim);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:28px;}
.ga{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-bottom:28px;}
.gb{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-bottom:28px;}
.card{background:var(--s1);border:1px solid var(--rim);border-radius:var(--r);
  padding:20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;}
.card:hover{border-color:var(--rim2);transform:translateY(-2px);}
.card-top{position:absolute;top:0;left:0;right:0;height:2px;background:var(--ca,transparent);}
.kpi-icon{font-size:20px;margin-bottom:12px;}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
.kpi-val{font-family:var(--mono);font-size:30px;font-weight:600;line-height:1;letter-spacing:-1px;}
.kpi-sub{font-size:11px;color:var(--sub);margin-top:7px;line-height:1.5;}
.bar{margin-bottom:10px;}
.bar-hd{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.bar-nm{font-size:12px;font-weight:600;}
.bar-vl{font-family:var(--mono);font-size:11px;color:var(--sub);}
.bar-tr{height:5px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden;}
.bar-fl{height:100%;border-radius:99px;background:var(--bc,var(--c0));width:0;transition:width 1.4s cubic-bezier(.4,0,.2,1);}
.hero{background:linear-gradient(135deg,rgba(124,106,247,.1),rgba(0,212,255,.05));
  border:1px solid rgba(124,106,247,.18);border-radius:18px;padding:32px 36px;margin-bottom:28px;
  display:flex;align-items:center;justify-content:space-between;gap:28px;flex-wrap:wrap;}
.hero-left h2{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:var(--sub);margin-bottom:8px;}
.hero-count{font-family:var(--mono);font-size:68px;font-weight:600;line-height:1;letter-spacing:-3px;
  background:linear-gradient(135deg,var(--text) 40%,var(--sub));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-label{font-size:13px;color:var(--sub);margin-top:6px;}
.hero-right{display:flex;flex-direction:column;gap:10px;min-width:240px;}
.hero-row{display:flex;align-items:center;gap:10px;}
.hero-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.hero-name{font-size:12px;flex:1;}
.hero-num{font-family:var(--mono);font-size:12px;color:var(--sub);}
.hero-pct{font-family:var(--mono);font-size:11px;color:var(--dim);width:36px;text-align:right;}
.ret-wrap{background:var(--s1);border:1px solid var(--rim);border-radius:var(--r);padding:20px;margin-bottom:28px;}
.ret-row{display:grid;grid-template-columns:130px 1fr 56px;gap:12px;align-items:center;margin-bottom:10px;}
.ret-row:last-child{margin-bottom:0;}
.ret-nm{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ret-tr{height:7px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden;}
.ret-fl{height:100%;border-radius:99px;background:var(--rc);width:0;transition:width 1.4s cubic-bezier(.4,0,.2,1);}
.ret-pct{font-family:var(--mono);font-size:12px;font-weight:500;text-align:right;}
.coh{background:var(--s1);border:1px solid var(--rim);border-radius:var(--r);
  padding:20px;cursor:pointer;position:relative;overflow:hidden;transition:all .2s;}
.coh::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ca);}
.coh:hover{transform:translateY(-3px);border-color:var(--rim2);}
.coh-hd{display:flex;align-items:center;gap:11px;margin-bottom:14px;}
.coh-em{font-size:22px;}
.coh-nm{font-size:14px;font-weight:700;letter-spacing:-.2px;}
.coh-wk{font-size:11px;color:var(--sub);margin-top:2px;}
.coh-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:14px;}
.coh-num{background:var(--s2);border-radius:8px;padding:9px;text-align:center;}
.coh-nv{font-family:var(--mono);font-size:16px;font-weight:500;margin-bottom:2px;}
.coh-nl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;}
.coh-ret{display:flex;align-items:center;justify-content:space-between;
  background:var(--s2);border-radius:8px;padding:8px 12px;font-size:11px;}
.coh-ret-l{color:var(--sub);}
.coh-ret-v{font-family:var(--mono);font-weight:600;}
.funnel{display:flex;flex-direction:column;gap:8px;}
.fstep{position:relative;border-radius:9px;overflow:hidden;background:var(--s2);border:1px solid var(--rim);padding:13px 16px;}
.ffill{position:absolute;top:0;left:0;bottom:0;background:var(--fc);transition:width 1.4s cubic-bezier(.4,0,.2,1);width:0;border-radius:9px;}
.fcontent{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;}
.flabel{font-size:12px;font-weight:600;}
.fsub{font-size:10px;color:var(--sub);margin-top:2px;}
.fright{text-align:right;flex-shrink:0;}
.fcount{font-family:var(--mono);font-size:17px;font-weight:500;}
.fpct{font-size:10px;color:var(--sub);margin-top:2px;}
.fdrop{padding:3px 0 3px 16px;font-size:11px;color:var(--c3);display:flex;align-items:center;gap:5px;}
.fdrop::before{content:'↘';}
.act{background:var(--s1);border:1px solid var(--rim);border-radius:var(--r);padding:18px;transition:all .2s;}
.act:hover{transform:translateY(-2px);}
.act-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.act-nm{font-size:13px;font-weight:700;}
.chip{font-size:10px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--cbg);color:var(--cc);}
.act-nums{display:flex;gap:6px;margin-top:12px;}
.anb{flex:1;background:var(--s2);border-radius:8px;padding:8px 5px;text-align:center;}
.anv{font-family:var(--mono);font-size:14px;font-weight:500;margin-bottom:2px;}
.anl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px;}
.top-row{background:var(--s2);border:1px solid var(--rim);border-radius:10px;
  padding:11px 14px;display:flex;align-items:center;gap:11px;transition:all .2s;margin-bottom:6px;}
.top-row:hover{border-color:var(--rim2);transform:translateX(3px);}
.top-rk{width:26px;height:26px;border-radius:7px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:600;}
.rk1{background:linear-gradient(135deg,#ffd166,#ff9052);color:#000;}
.rk2{background:linear-gradient(135deg,#b8c4d4,#8899aa);color:#000;}
.rk3{background:linear-gradient(135deg,#cd7f32,#8b5030);color:#fff;}
.rkn{background:var(--s3);color:var(--sub);}
.top-info{flex:1;min-width:0;}
.top-nm{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top-em{font-size:10px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;}
.top-mets{display:flex;gap:12px;flex-shrink:0;}
.top-met{text-align:right;}
.top-mv{font-family:var(--mono);font-size:12px;font-weight:500;}
.top-ml{font-size:9px;color:var(--sub);}
.loader{text-align:center;padding:80px 20px;}
.spinner{width:36px;height:36px;border:3px solid var(--rim);border-top-color:var(--c0);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg);}}
.err-box{background:rgba(255,92,122,.07);border:1px solid rgba(255,92,122,.2);
  border-radius:10px;padding:14px 18px;font-size:13px;color:var(--c3);margin-bottom:20px;}
.page{animation:fadeUp .3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:860px){
  header,.tab-bar,.main{padding-left:18px;padding-right:18px;}
  .g5,.g4{grid-template-columns:repeat(2,1fr);}
  .g3{grid-template-columns:repeat(2,1fr);}
  .g2{grid-template-columns:1fr;}
  .hero{flex-direction:column;}
  .hero-count{font-size:48px;}
  .ret-row{grid-template-columns:100px 1fr 48px;}
  .top-mets{display:none;}
}
</style>
</head>
<body>
<header>
  <div class="hd-logo">
    <div class="hd-mark">🚀</div>
    <div class="hd-title">Vinternship · Live Dashboard</div>
  </div>
  <div class="hd-right">
    <span class="pill" id="timePill">Loading…</span>
    <span class="pill on" id="activePill" style="display:none"></span>
    <button id="refreshBtn" onclick="init()">↻ Refresh</button>
  </div>
</header>
<div class="tab-bar" id="tabBar">
  <button class="tab active" id="t-overview" style="--tc:var(--c0)" onclick="showTab('overview')">
    <span class="tdot" style="background:linear-gradient(135deg,var(--c0),var(--c3))"></span>All Cohorts
  </button>
</div>
<div class="main" id="main">
  <div class="loader"><div class="spinner"></div><p style="color:var(--sub);font-size:13px">Connecting to Google Sheets…</p></div>
</div>

<script>
// ════════════════════════════════════════════
// ⚙️ CONFIG — EDIT THESE TWO THINGS ONLY
// ════════════════════════════════════════════
const MASTER_SHEET_ID = '1MphAjiCSYG_2BdIAyg-teWSfytZz41C55c9bOL0WtbQ';

const COHORTS = [
  { id:'euclideans',  name:'Euclideans',  emoji:'📐', color:'--c0', tab:'Euclideans_Dashboard'  },
  { id:'dijkstrians', name:'Dijkstrians', emoji:'🔗', color:'--c1', tab:'Dijkstrians_Dashboard' },
  { id:'kruskalians', name:'Kruskalians', emoji:'🌐', color:'--c2', tab:'Kruskalians_Dashboard' },
  { id:'aksians',     name:'AKSians',     emoji:'🔐', color:'--c3', tab:'AKSians_Dashboard'     },
  { id:'rsaians',     name:'RSAians',     emoji:'🧮', color:'--c4', tab:'RSAians_Dashboard'     },
];
// ════════════════════════════════════════════

let data = {};
let activeTab = 'overview';

async function fetchSheet(sheetId, tabName) {
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
  const r   = await fetch(url);
  const txt = await r.text();
  const raw = txt.replace(/^[^{]*/, '').replace(/[^}]*$/, '');
  const obj = JSON.parse(raw);
  const cols = obj.table.cols.map(c => c.label || c.id || '');
  const rows = (obj.table.rows || []).map(row => {
    if (!row || !row.c) return null;
    const o = {};
    row.c.forEach((cell, i) => { o[cols[i]] = cell?.v ?? ''; });
    return o;
  }).filter(Boolean);
  return { cols, rows };
}

function sf(v,d=0){try{return parseFloat(v)||d;}catch{return d;}}

async function parseCohort(cfg) {
  const result = {
    id:cfg.id, name:cfg.name, emoji:cfg.emoji,
    color:`var(${cfg.color})`, colorVar:cfg.color,
    total:0, dropped:0, enrolled:0,
    avgVibe:0, avgCs:0, avgHp:0,
    vibe100:0, cs100:0,
    activities:[], top5:[], phaseCounts:{}, error:null,
  };
  try {
    const dash = await fetchSheet(MASTER_SHEET_ID, cfg.tab);
    const students = dash.rows.filter(r => {
      const n = String(r['Name']||r['name']||'').trim();
      return n && n.toLowerCase() !== 'name';
    }).map(r => ({
      name:      String(r['Name']||r['name']||'').trim(),
      email:     String(r['Email']||r['email']||'').trim().toLowerCase(),
      status:    String(r['Status']||r['status']||'Active').trim(),
      vibe:      sf(r['Vibe Progress']||r['ViBe Progress']||0),
      cs:        sf(r['Case Study Progress']||0),
      hp:        sf(r['Health Points']||0),
      overall:   sf(r['Overall Progress']||0),
      phaseDrop: String(r['Phase Dropped']||r['phase_dropped']||'').trim(),
    }));

    const active  = students.filter(s=>s.status.toLowerCase()==='active');
    const dropped = students.filter(s=>s.status.toLowerCase()==='dropped');
    const n = active.length;
    result.total    = n;
    result.dropped  = dropped.length;
    result.enrolled = students.length;

    if (n > 0) {
      result.avgVibe = +(active.reduce((s,x)=>s+x.vibe,0)/n).toFixed(1);
      result.avgCs   = +(active.reduce((s,x)=>s+x.cs,0)/n).toFixed(1);
      result.avgHp   = +(active.reduce((s,x)=>s+x.hp,0)/n).toFixed(1);
      result.vibe100 = active.filter(s=>s.vibe>=100).length;
      result.cs100   = active.filter(s=>s.cs>=100).length;
    }

    result.activities = [
      { name:'Vibe Progress', icon:'⚡', color:'var(--c0)',
        avg:result.avgVibe, done:result.vibe100,
        inProg:active.filter(s=>s.vibe>0&&s.vibe<100).length,
        notYet:active.filter(s=>s.vibe===0).length, total:n },
      { name:'Case Study', icon:'📚', color:'var(--c2)',
        avg:result.avgCs, done:result.cs100,
        inProg:active.filter(s=>s.cs>0&&s.cs<100).length,
        notYet:active.filter(s=>s.cs===0).length, total:n },
      { name:'Health Points', icon:'❤️', color:'var(--c4)',
        avg:+(result.avgHp/200*100).toFixed(1),
        done:0, inProg:n, notYet:0, total:n,
        note:`Avg: ${result.avgHp} HP` },
    ];

    const score = s => s.overall>0 ? s.overall : (s.vibe*.4+s.cs*.3+(s.hp/2)*.3);
    result.top5 = [...active].sort((a,b)=>score(b)-score(a)).slice(0,5)
      .map((s,i)=>({...s, rank:i+1, score:+score(s).toFixed(1)}));

    const pc = {};
    dropped.forEach(s=>{ if(s.phaseDrop) pc[s.phaseDrop]=(pc[s.phaseDrop]||0)+1; });
    result.phaseCounts = pc;

  } catch(e) { result.error = e.message; }
  return result;
}

async function init() {
  document.getElementById('main').innerHTML =
    `<div class="loader"><div class="spinner"></div><p style="color:var(--sub);font-size:13px">Loading cohort data…</p></div>`;
  document.getElementById('activePill').style.display = 'none';
  try {
    const results = await Promise.all(COHORTS.map(parseCohort));
    data = {};
    results.forEach(r => { data[r.id] = r; });
    buildTabs();
    showTab('overview');
    const totalActive = results.reduce((s,c)=>s+c.total,0);
    const ap = document.getElementById('activePill');
    ap.textContent = `● ${totalActive.toLocaleString()} students active`;
    ap.style.display = 'inline-block';
    document.getElementById('timePill').textContent = `Updated ${new Date().toLocaleTimeString()}`;
    document.getElementById('timePill').className = 'pill';
  } catch(e) {
    document.getElementById('main').innerHTML = `
      <div class="err-box">⚠️ Could not load data — ${e.message}</div>
      <p style="color:var(--sub);font-size:13px;margin-top:10px">
        1. Make sure <code style="color:var(--c0)">MASTER_SHEET_ID</code> is correct in this file.<br>
        2. Make sure your Google Sheet is set to <strong>Anyone with link → Viewer</strong>.
      </p>`;
    document.getElementById('timePill').textContent = 'Error';
    document.getElementById('timePill').className = 'pill err';
  }
}

function buildTabs() {
  const bar = document.getElementById('tabBar');
  bar.querySelectorAll('.dyn').forEach(t=>t.remove());
  COHORTS.forEach(cfg => {
    const c = data[cfg.id]; if(!c) return;
    const btn = document.createElement('button');
    btn.className='tab dyn'; btn.id=`t-${cfg.id}`;
    btn.style.setProperty('--tc',`var(${cfg.color})`);
    btn.onclick=()=>showTab(cfg.id);
    btn.innerHTML=`<span class="tdot" style="background:var(${cfg.color})"></span>${cfg.emoji} ${cfg.name}`;
    bar.appendChild(btn);
  });
}

function showTab(id) {
  activeTab=id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const tab=document.getElementById(`t-${id}`); if(tab) tab.classList.add('active');
  if(id==='overview') renderOverview();
  else renderCohort(data[id], COHORTS.findIndex(c=>c.id===id));
}

function animBars() {
  setTimeout(()=>{
    document.querySelectorAll('.bar-fl,.ret-fl,.ffill').forEach(el=>{
      el.style.width=(el.dataset.w||0)+'%';
    });
  },80);
}

function cv(i){return `var(${COHORTS[i%COHORTS.length].color})`;}

function barHtml(pct,color,label,val){
  const w=Math.min(parseFloat(pct)||0,100);
  return `<div class="bar"><div class="bar-hd"><span class="bar-nm">${label}</span><span class="bar-vl">${val}</span></div>
    <div class="bar-tr"><div class="bar-fl" style="--bc:${color}" data-w="${w}"></div></div></div>`;
}

function kpi(icon,label,val,sub,color){
  return `<div class="card" style="--ca:${color}"><div class="card-top"></div>
    <div class="kpi-icon">${icon}</div><div class="kpi-lbl">${label}</div>
    <div class="kpi-val" style="color:${color}">${val}</div>
    <div class="kpi-sub">${sub}</div></div>`;
}

function actCard(a){
  const p=parseFloat(a.avg)||0;
  const cc=p>=90?'var(--c2)':p>=60?'var(--c4)':'var(--c3)';
  const cbg=p>=90?'rgba(0,229,138,.1)':p>=60?'rgba(255,185,64,.1)':'rgba(255,92,122,.1)';
  return `<div class="act"><div class="act-hd">
    <div class="act-nm">${a.icon} ${a.name}</div>
    <div class="chip" style="--cbg:${cbg};--cc:${cc}">${p.toFixed(1)}%</div></div>
    <div class="bar-tr"><div class="bar-fl" style="--bc:${a.color}" data-w="${Math.min(p,100)}"></div></div>
    ${a.note?`<div style="font-size:10px;color:var(--sub);margin-top:5px">${a.note}</div>`:''}
    <div class="act-nums">
      <div class="anb"><div class="anv" style="color:var(--c2)">${a.done}</div><div class="anl">Done</div></div>
      <div class="anb"><div class="anv" style="color:var(--c4)">${a.inProg}</div><div class="anl">Active</div></div>
      <div class="anb"><div class="anv" style="color:var(--c3)">${a.notYet}</div><div class="anl">Pending</div></div>
    </div></div>`;
}

function topRow(s,rank){
  const rc=rank<=3?`rk${rank}`:'rkn';
  const sc=rank===1?'#ffd166':rank===2?'#b8c4d4':rank===3?'#cd7f32':'var(--c0)';
  return `<div class="top-row"><div class="top-rk ${rc}">${rank}</div>
    <div class="top-info"><div class="top-nm">${s.name}</div><div class="top-em">${s.email}</div></div>
    <div class="top-mets">
      <div class="top-met"><div class="top-mv" style="color:${sc}">${s.score.toFixed(1)}%</div><div class="top-ml">Score</div></div>
      <div class="top-met"><div class="top-mv" style="color:var(--c3)">${s.hp.toFixed(0)}</div><div class="top-ml">HP</div></div>
    </div></div>`;
}

function renderOverview(){
  const cohorts=COHORTS.map(c=>data[c.id]).filter(Boolean);
  if(!cohorts.length) return;
  const totalEnrolled=cohorts.reduce((s,c)=>s+c.enrolled,0);
  const totalActive=cohorts.reduce((s,c)=>s+c.total,0);
  const totalDropped=cohorts.reduce((s,c)=>s+c.dropped,0);
  const retPct=totalEnrolled?(totalActive/totalEnrolled*100).toFixed(1):'0.0';
  const avgVibe=cohorts.length?(cohorts.reduce((s,c)=>s+c.avgVibe,0)/cohorts.length).toFixed(1):'0';

  document.getElementById('main').innerHTML=`<div class="page">
    <div class="hero">
      <div class="hero-left">
        <h2>Students Currently Training</h2>
        <div class="hero-count">${totalActive.toLocaleString()}</div>
        <div class="hero-label">${cohorts.length} active cohorts · ${retPct}% overall retention</div>
      </div>
      <div class="hero-right">
        ${cohorts.map((c,i)=>`<div class="hero-row">
          <div class="hero-dot" style="background:${cv(i)}"></div>
          <div class="hero-name">${c.emoji} ${c.name}</div>
          <div class="hero-num">${c.total.toLocaleString()}</div>
          <div class="hero-pct">${c.enrolled?(c.total/c.enrolled*100).toFixed(0):0}%</div>
        </div>`).join('')}
      </div>
    </div>
    <div class="slabel">Global Numbers</div>
    <div class="g4">
      ${kpi('👥','Total Enrolled',totalEnrolled.toLocaleString(),`Across ${cohorts.length} cohorts`,'var(--c0)')}
      ${kpi('✅','Currently Active',totalActive.toLocaleString(),`${retPct}% retention rate`,'var(--c2)')}
      ${kpi('📉','Total Dropped',totalDropped.toLocaleString(),'Did not meet milestones','var(--c3)')}
      ${kpi('⚡','Avg Vibe Progress',avgVibe+'%','Combined average','var(--c1)')}
    </div>
    <div class="slabel">Retention Rate per Cohort</div>
    <div class="ret-wrap">
      ${cohorts.map((c,i)=>{
        const pct=c.enrolled?Math.round(c.total/c.enrolled*100):0;
        return `<div class="ret-row">
          <div class="ret-nm">${c.emoji} ${c.name}</div>
          <div class="ret-tr"><div class="ret-fl" style="--rc:${cv(i)}" data-w="${pct}"></div></div>
          <div class="ret-pct" style="color:${cv(i)}">${pct}%</div>
        </div>`;
      }).join('')}
    </div>
    <div class="slabel">Cohort Overview — click to drill in</div>
    <div class="gb">
      ${cohorts.map((c,i)=>{
        const ret=(c.enrolled?(c.total/c.enrolled*100).toFixed(0):0);
        return `<div class="coh" style="--ca:${cv(i)}" onclick="showTab('${c.id}')">
          <div class="coh-hd"><div class="coh-em">${c.emoji}</div>
            <div><div class="coh-nm">${c.name}</div><div class="coh-wk">Click to drill in →</div></div></div>
          <div class="coh-nums">
            <div class="coh-num"><div class="coh-nv" style="color:${cv(i)}">${c.total}</div><div class="coh-nl">Active</div></div>
            <div class="coh-num"><div class="coh-nv" style="color:var(--c3)">${c.dropped}</div><div class="coh-nl">Dropped</div></div>
            <div class="coh-num"><div class="coh-nv" style="color:var(--sub)">${c.enrolled}</div><div class="coh-nl">Enrolled</div></div>
          </div>
          ${barHtml(c.avgVibe,cv(i),'Avg Vibe',c.avgVibe.toFixed(1)+'%')}
          ${c.avgCs>0?barHtml(c.avgCs,'var(--c2)','Avg Case Study',c.avgCs.toFixed(1)+'%'):''}
          <div class="coh-ret"><span class="coh-ret-l">Retention</span>
            <span class="coh-ret-v" style="color:${cv(i)}">${ret}%</span></div>
        </div>`;
      }).join('')}
    </div>
    <div class="slabel">Top Performers per Cohort</div>
    <div class="g2">
      ${cohorts.map((c,i)=>c.top5?.length?`
        <div class="card" style="--ca:${cv(i)}"><div class="card-top"></div>
          <div style="font-size:12px;font-weight:700;margin-bottom:12px">${c.emoji} ${c.name}</div>
          ${c.top5.map((s,ri)=>topRow(s,ri+1)).join('')}
        </div>`:''
      ).join('')}
    </div>
  </div>`;
  animBars();
}

function renderCohort(c,idx){
  if(!c) return;
  const color=cv(idx);
  const enrolled=c.enrolled||1;
  const ret=(c.total/enrolled*100).toFixed(1);
  const phases=Object.entries(c.phaseCounts||{}).sort((a,b)=>a[0].localeCompare(b[0]));
  let funnelHtml='';

  if(phases.length){
    let entering=enrolled;
    const steps=phases.map(([phase,dropped])=>{
      const pct=Math.round(entering/enrolled*100);
      const dropPct=(dropped/entering*100).toFixed(1);
      const html=`<div class="fstep">
        <div class="ffill" style="--fc:${color}18" data-w="${pct}"></div>
        <div class="fcontent">
          <div><div class="flabel">${phase}</div><div class="fsub">Students entering</div></div>
          <div class="fright"><div class="fcount" style="color:${color}">${entering.toLocaleString()}</div>
            <div class="fpct">${pct}% of enrolled</div></div>
        </div></div>
        <div class="fdrop">${dropped.toLocaleString()} dropped here (${dropPct}%)</div>`;
      entering -= dropped;
      return html;
    });
    steps.push(`<div class="fstep" style="border-color:${color}44">
      <div class="ffill" style="--fc:${color}22" data-w="${Math.round(c.total/enrolled*100)}"></div>
      <div class="fcontent">
        <div><div class="flabel" style="color:${color}">✅ Currently Active</div><div class="fsub">Passed all milestones</div></div>
        <div class="fright"><div class="fcount" style="color:${color}">${c.total.toLocaleString()}</div>
          <div class="fpct">${ret}% retention</div></div>
      </div></div>`);
    funnelHtml=`<div class="slabel">Phase-by-Phase Dropout Funnel</div>
      <div class="card" style="margin-bottom:28px"><div class="funnel">${steps.join('')}</div></div>`;
  } else {
    funnelHtml=`<div class="slabel">Enrollment Funnel</div>
      <div class="card" style="margin-bottom:28px"><div class="funnel">
        <div class="fstep"><div class="ffill" style="--fc:${color}18" data-w="100"></div>
          <div class="fcontent">
            <div><div class="flabel">Total Enrolled</div><div class="fsub">Started the program</div></div>
            <div class="fright"><div class="fcount">${enrolled.toLocaleString()}</div><div class="fpct">100%</div></div>
          </div></div>
        ${c.dropped>0?`<div class="fdrop">${c.dropped.toLocaleString()} dropped — missed milestone</div>`:''}
        <div class="fstep" style="border-color:${color}44">
          <div class="ffill" style="--fc:${color}22" data-w="${Math.round(c.total/enrolled*100)}"></div>
          <div class="fcontent">
            <div><div class="flabel" style="color:${color}">✅ Currently Active</div><div class="fsub">Still in program</div></div>
            <div class="fright"><div class="fcount" style="color:${color}">${c.total.toLocaleString()}</div>
              <div class="fpct">${ret}% retention</div></div>
          </div></div>
      </div>
      <p style="font-size:11px;color:var(--sub);margin-top:14px;padding-top:14px;border-top:1px solid var(--rim)">
        💡 Add a <strong style="color:var(--text)">Phase Dropped</strong> column to your Dashboard tab to see the detailed phase funnel.
      </p></div>`;
  }

  document.getElementById('main').innerHTML=`<div class="page">
    <div class="slabel">${c.emoji} ${c.name} — Overview</div>
    <div class="g5">
      ${kpi('👥','Enrolled',enrolled.toLocaleString(),'Total who started',color)}
      ${kpi('✅','Active Now',c.total.toLocaleString(),`${ret}% retention`,'var(--c2)')}
      ${kpi('📉','Dropped',c.dropped.toLocaleString(),'Missed milestone','var(--c3)')}
      ${kpi('⚡','Avg Vibe',c.avgVibe.toFixed(1)+'%',`${c.vibe100} at 100%`,'var(--c1)')}
      ${kpi('❤️','Avg HP',c.avgHp.toFixed(0),'Health points avg','var(--c4)')}
    </div>
    ${funnelHtml}
    <div class="slabel">Activity Breakdown</div>
    <div class="ga">${(c.activities||[]).map(actCard).join('')}</div>
    ${c.top5?.length?`
    <div class="slabel">Top 5 Students</div>
    <div class="card" style="--ca:${color};margin-bottom:28px"><div class="card-top"></div>
      ${c.top5.map((s,i)=>topRow(s,i+1)).join('')}
    </div>`:''}
  </div>`;
  animBars();
}

init();
</script>
</body>
</html>
